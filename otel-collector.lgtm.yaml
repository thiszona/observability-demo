# Part 3, Grafana LGTM: same receivers as Part 2, exporter now points at the
# grafana/otel-lgtm container (Tempo for traces, Mimir for metrics, Loki for logs).
receivers:
  otlp:
    protocols:
      http:
        endpoint: 0.0.0.0:4318

processors:
  batch: {}

exporters:
  otlphttp/lgtm:
    endpoint: http://lgtm:4318

service:
  pipelines:
    traces:
      receivers: [otlp]
      processors: [batch]
      exporters: [otlphttp/lgtm]
    metrics:
      receivers: [otlp]
      processors: [batch]
      exporters: [otlphttp/lgtm]
    logs:
      receivers: [otlp]
      processors: [batch]
      exporters: [otlphttp/lgtm]
