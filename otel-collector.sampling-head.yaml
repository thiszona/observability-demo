# Part 4, head-based sampling: keep a flat 10% of traces, decided up front by
# trace id. Cheap and simple, but it drops error traces at the same rate as
# everything else. Exports to grafana/otel-lgtm.
receivers:
  otlp:
    protocols:
      http:
        endpoint: 0.0.0.0:4318

processors:
  batch: {}
  probabilistic_sampler:
    sampling_percentage: 10

exporters:
  otlphttp/lgtm:
    endpoint: http://lgtm:4318

service:
  pipelines:
    traces:
      receivers: [otlp]
      processors: [probabilistic_sampler, batch]
      exporters: [otlphttp/lgtm]
    metrics:
      receivers: [otlp]
      processors: [batch]
      exporters: [otlphttp/lgtm]
    logs:
      receivers: [otlp]
      processors: [batch]
      exporters: [otlphttp/lgtm]
