# Part 3, SigNoz backend. SigNoz runs as its own stack, so start it separately
# first (https://signoz.io/docs/install/docker/). That creates a docker network
# named `signoz-network` with an `ingester` service listening for OTLP. This
# override joins the collector to that network and forwards telemetry to it:
#   docker compose -f compose.yaml -f compose.signoz.yaml up --build
# Then open SigNoz at http://localhost:8080.
services:
  otel-collector:
    command: ["--config=/etc/otelcol/signoz.yaml"]
    volumes:
      - ./otel-collector.signoz.yaml:/etc/otelcol/signoz.yaml:ro
    networks:
      - default
      - signoz-network

networks:
  signoz-network:
    external: true
