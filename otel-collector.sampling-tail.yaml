# Part 4, tail-based sampling: wait for each trace to finish, then keep it if it
# errored, otherwise keep 10% of the rest. Catches 100% of error traces at the
# cost of buffering whole traces in memory. Exports to grafana/otel-lgtm.
receivers:
  otlp:
    protocols:
      http:
        endpoint: 0.0.0.0:4318

processors:
  batch: {}
  tail_sampling:
    decision_wait: 5s
    policies:
      - name: keep-all-errors
        type: status_code
        status_code:
          status_codes: [ERROR]
      - name: sample-the-rest
        type: probabilistic
        probabilistic:
          sampling_percentage: 10

exporters:
  otlphttp/lgtm:
    endpoint: http://lgtm:4318

service:
  pipelines:
    traces:
      receivers: [otlp]
      processors: [tail_sampling, batch]
      exporters: [otlphttp/lgtm]
    metrics:
      receivers: [otlp]
      processors: [batch]
      exporters: [otlphttp/lgtm]
    logs:
      receivers: [otlp]
      processors: [batch]
      exporters: [otlphttp/lgtm]
