# Part 2 collector: receive traces, metrics, and logs over OTLP, print to stdout.
# Part 3 keeps the same receivers and swaps the exporter (see otel-collector.lgtm.yaml
# and otel-collector.signoz.yaml). Only this file changes; the services do not.
receivers:
  otlp:
    protocols:
      http:
        endpoint: 0.0.0.0:4318

processors:
  batch: {}

exporters:
  debug:
    verbosity: detailed

service:
  pipelines:
    traces:
      receivers: [otlp]
      processors: [batch]
      exporters: [debug]
    metrics:
      receivers: [otlp]
      processors: [batch]
      exporters: [debug]
    logs:
      receivers: [otlp]
      processors: [batch]
      exporters: [debug]
